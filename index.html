<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="星际战机">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星际战机</title>
<style>
@charset "UTF-8";
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: "Courier New", monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
#game-container { position: relative; width: 100%; max-width: 960px; height: 100vh; max-height: 640px; margin: 0 auto; overflow: hidden; }
canvas { touch-action: none; display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
#ui-overlay { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; padding: 8px 12px; display: flex; justify-content: space-between; align-items: flex-start; }
#ui-overlay > div { display: flex; gap: 16px; align-items: flex-start; }
.ui-stat { color: #fff; font-size: 13px; letter-spacing: 2px; text-shadow: 0 0 6px rgba(0,255,255,0.5); }
.ui-stat.combo { color: #ffcc00; text-shadow: 0 0 8px rgba(255,200,0,0.6); }
.ui-stat.lives { color: #ff5555; }
#start-screen, #game-over-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
#game-over-screen { display: none; }
.screen-title { font-size: 48px; font-weight: bold; letter-spacing: 6px; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.4), 0 4px 0 #005566; margin-bottom: 8px; }
.screen-subtitle { font-size: 16px; color: #888; letter-spacing: 4px; margin-bottom: 24px; }
.screen-btn { font-family: inherit; font-size: 18px; letter-spacing: 3px; padding: 10px 32px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; outline: none; text-shadow: 0 0 6px rgba(0,229,255,0.5); transition: all 0.15s; }
.screen-btn:hover { background: #00e5ff; color: #0a0a12; text-shadow: none; }
.controls-hint { font-size: 12px; color: #555; letter-spacing: 2px; margin-top: 16px; }
.controls-hint span { color: #00e5ff; }
#final-score { font-size: 28px; color: #ffcc00; letter-spacing: 4px; margin-bottom: 12px; text-shadow: 0 0 12px rgba(255,200,0,0.5); }
#high-score-display { font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 20px; }
#mobile-controls { position: absolute; bottom: 8px; left: 0; right: 0; display: none; justify-content: center; gap: 24px; pointer-events: all; padding: 0 16px; }
.mobile-btn { width: 56px; height: 56px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mobile-btn.shoot { width: 72px; height: 72px; border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.1); color: rgba(0,229,255,0.8); font-size: 28px; }
@media (max-width: 768px), (pointer: coarse) { #mobile-controls { display: flex; } #game-container { max-height: 100vh; } }

/* ── Auth ── */
#auth-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: #aaa; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.15s; }
#auth-btn:hover { border-color: #00e5ff; color: #00e5ff; }
#auth-status { color: #00e5ff; font-size: 12px; letter-spacing: 2px; text-shadow: 0 0 6px rgba(0,229,255,0.4); cursor: pointer; pointer-events: all; }
#auth-status:empty { display: none; }
#auth-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5,5,15,0.95); display: none; flex-direction: column; align-items: center; z-index: 25; padding-top: 40px; }
#auth-panel h2 { color: #00e5ff; font-size: 20px; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,229,255,0.5); }
.auth-tabs { display: flex; gap: 0; margin-bottom: 20px; }
.auth-tab { font-family: inherit; font-size: 15px; letter-spacing: 2px; padding: 6px 20px; background: transparent; border: none; color: #777; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.auth-tab:hover { color: #00e5ff; }
.auth-tab.active { color: #00e5ff; border-bottom: 2px solid #00e5ff; }
.auth-field { font-family: inherit; font-size: 14px; letter-spacing: 2px; width: 240px; padding: 8px 12px; margin-bottom: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #fff; outline: none; }
.auth-field:focus { border-color: #00e5ff; }
.auth-field::placeholder { color: #444; }
.auth-submit { font-family: inherit; font-size: 16px; letter-spacing: 3px; padding: 8px 40px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; margin-top: 6px; text-shadow: 0 0 6px rgba(0,229,255,0.5); transition: all 0.15s; }
.auth-submit:hover { background: #00e5ff; color: #0a0a12; text-shadow: none; }
.auth-msg { color: #ff5555; font-size: 12px; letter-spacing: 1px; margin-top: 8px; display: none; }
.auth-close { font-family: inherit; font-size: 13px; letter-spacing: 2px; padding: 4px 20px; border: 1px solid #555; background: transparent; color: #555; cursor: pointer; margin-top: 16px; }
.auth-close:hover { border-color: #00e5ff; color: #00e5ff; }
</style>
</head>
<body>
<div id="game-container">
<canvas id="game"></canvas>
<div id="ui-overlay">
<div><div class="ui-stat" id="score-ui">SCORE 0</div><div class="ui-stat combo" id="combo-ui" style="display:none"></div><div class="ui-stat" id="auth-status" onclick="toggleAuth()"></div></div>
<div class="ui-stat lives" id="lives-ui">HEARTS 3</div>
</div>
<div id="start-screen">

<button id="auth-btn" onclick="toggleAuth()" title="登录">&#x1F464;</button>
<div class="screen-title">星际战机</div>
<div class="screen-subtitle">PIXEL SPACE SHOOTER</div>
<button class="screen-btn" id="start-btn" autofocus>开 始</button>
<div class="controls-hint"><span>方向键</span> 移动 · <span>空格</span> 射击 · <span>P</span> 暂停</div>
</div>
<div id="game-over-screen">
<div class="screen-title">摧 毁</div>
<div id="final-score">得分 0</div>
<div id="high-score-display">最高 0</div>
<button class="screen-btn" id="restart-btn">再 来</button>
</div>
<div id="mobile-controls">
<button class="mobile-btn" id="btn-up">▲</button>
<button class="mobile-btn" id="btn-left">◀</button>
<button class="mobile-btn shoot" id="btn-shoot">●</button>
<button class="mobile-btn" id="btn-right">▶</button>
<button class="mobile-btn" id="btn-down">▼</button>
</div>
<button id="lb-close" onclick="toggleLB()">关闭</button></div>
<div id="auth-panel">
<h2>&#x1F464; 账户</h2>
<div class="auth-tabs">
<button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录</button>
<button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册</button>
</div>
<input class="auth-field" id="auth-email" type="email" placeholder="邮箱" autocomplete="email">
<input class="auth-field" id="auth-pw" type="password" placeholder="密码" autocomplete="current-password">
<div id="auth-username-row" style="display:none"><input class="auth-field" id="auth-username" type="text" placeholder="玩家名" autocomplete="username"></div>
<button class="auth-submit" id="auth-submit" onclick="doLogin()">登录</button>
<div class="auth-msg" id="auth-msg"></div>
<button class="auth-close" onclick="toggleAuth()">关闭</button>
</div>
</div>
<script src="game.js"></script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}</script>
</body>
</html>
