<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>星际战机</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: "Courier New", monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
#game-container { position: relative; width: 100%; max-width: 960px; height: 100vh; max-height: 640px; margin: 0 auto; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; touch-action: none; }
#ui-overlay { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; padding: 8px 12px; display: flex; justify-content: space-between; }
.ui-stat { color: #fff; font-size: 13px; letter-spacing: 2px; text-shadow: 0 0 6px rgba(0,255,255,0.5); }
.ui-stat.combo { color: #ffcc00; }
.ui-stat.lives { color: #ff5555; }
#start-screen, #game-over-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
#game-over-screen { display: none; }
.screen-title { font-size: 48px; font-weight: bold; letter-spacing: 6px; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.4), 0 4px 0 #005566; margin-bottom: 8px; }
.screen-subtitle { font-size: 16px; color: #888; letter-spacing: 4px; margin-bottom: 24px; }
.screen-btn { font-family: inherit; font-size: 18px; letter-spacing: 3px; padding: 10px 32px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; }
.screen-btn:hover { background: #00e5ff; color: #0a0a12; }
.controls-hint { font-size: 12px; color: #555; letter-spacing: 2px; margin-top: 16px; }
.controls-hint span { color: #00e5ff; }
#final-score { font-size: 28px; color: #ffcc00; letter-spacing: 4px; margin-bottom: 12px; }
#high-score-display { font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 20px; }
#mobile-controls { position: absolute; bottom: 8px; left: 0; right: 0; display: none; justify-content: center; gap: 24px; pointer-events: all; padding: 0 16px; }
.mobile-btn { width: 56px; height: 56px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.mobile-btn.shoot { width: 72px; height: 72px; border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.1); color: rgba(0,229,255,0.8); font-size: 28px; }
@media (max-width: 768px), (pointer: coarse) { #mobile-controls { display: flex; } #game-container { max-height: 100vh; } }

#lb-btn { position: absolute; top: 10px; right: 56px; width: 36px; height: 36px; border-radius: 6px; border: 1px solid rgba(0,229,255,0.4); background: rgba(0,229,255,0.06); color: #00e5ff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
#lb-btn:hover { border-color: #00e5ff; background: rgba(0,229,255,0.12); }
#lb-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(4,4,12,0.96); display: none; flex-direction: column; align-items: center; z-index: 20; padding-top: 30px; }
#lb-panel h2 { color: #00e5ff; font-size: 20px; letter-spacing: 3px; margin-bottom: 16px; }
#lb-list { width: 240px; max-height: 320px; overflow-y: auto; }
.lb-row { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; color: #aaa; letter-spacing: 2px; }
.lb-row:first-child { color: #ffcc00; font-size: 16px; }
.lb-row:nth-child(2) { color: #ccc; }
.lb-row:nth-child(3) { color: #cc8844; }
.lb-rank { font-weight: bold; }
.lb-score { color: #00e5ff; }
.lb-empty { color: #555; text-align: center; padding: 24px; font-size: 14px; }
#lb-close { font-family: inherit; font-size: 14px; letter-spacing: 2px; padding: 6px 24px; border: 1px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; margin-top: 18px; }
#lb-close:hover { background: #00e5ff; color: #0a0a12; }
</style>
</head>
<body>
<div id="game-container">
<canvas id="game"></canvas>
<div id="ui-overlay">
<div><div class="ui-stat" id="score-ui">SCORE 0</div><div class="ui-stat combo" id="combo-ui" style="display:none"></div></div>
<div class="ui-stat lives" id="lives-ui">HEARTS 3</div>
</div>
<div id="start-screen">
<button id="lb-btn" onclick="toggleLB()" title="排行榜">🏆</button>
<div class="screen-title">星际战机</div>
<div class="screen-subtitle">PIXEL SPACE SHOOTER</div>
<button class="screen-btn" id="start-btn" autofocus>开 始</button>
<div class="controls-hint"><span>方向键</span> 移动 · <span>空格</span> 射击 · <span>P</span> 暂停</div>
</div>
<div id="game-over-screen">
<div class="screen-title">坠 毁</div>
<div id="final-score">得分 0</div>
<div id="high-score-display">最高 0</div>
<button class="screen-btn" id="restart-btn">再 来</button>
</div>
<div id="mobile-controls">
<button class="mobile-btn" id="btn-up">▲</button>
<button class="mobile-btn" id="btn-left">◀</button>
<button class="mobile-btn shoot" id="btn-shoot">◎</button>
<button class="mobile-btn" id="btn-right">▶</button>
<button class="mobile-btn" id="btn-down">▼</button>
</div>
<div id="lb-panel"><h2>🏆 今日排行榜</h2><div id="lb-list"></div><button id="lb-close" onclick="toggleLB()">关闭</button></div>
</div>
<script src="game.js"></script>
</body>
</html>
