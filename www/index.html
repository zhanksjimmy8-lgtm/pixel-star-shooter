<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="鏄熼檯鎴樻満">
<meta name="theme-color" content="#0a0a14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>鏄熼檯鎴樻満</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: "Courier New", monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
#game-container { position: relative; width: 100%; max-width: 960px; height: 100vh; max-height: 640px; margin: 0 auto; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; }
#ui-overlay { position: absolute; top: 0; left: 0; right: 0; pointer-events: none; padding: 8px 12px; display: flex; justify-content: space-between; align-items: flex-start; }
#ui-overlay > div { display: flex; gap: 16px; align-items: flex-start; }
.ui-stat { color: #fff; font-size: 13px; letter-spacing: 2px; text-shadow: 0 0 6px rgba(0,255,255,0.5); }
.ui-stat.combo { color: #ffcc00; text-shadow: 0 0 8px rgba(255,200,0,0.6); }
.ui-stat.lives { color: #ff5555; }
#start-screen, #game-over-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
#game-over-screen { display: none; }
.screen-title { font-size: 48px; font-weight: bold; letter-spacing: 6px; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.4), 0 4px 0 #005566; margin-bottom: 8px; }
.screen-subtitle { font-size: 16px; color: #888; letter-spacing: 4px; margin-bottom: 24px; }
.screen-btn { font-family: inherit; font-size: 18px; letter-spacing: 3px; padding: 10px 32px; border: 2px solid #00e5ff; background: transparent; color: #00e5ff; cursor: pointer; outline: none; text-shadow: 0 0 6px rgba(0,229,255,0.5); transition: all 0.15s; }
.screen-btn:hover { background: #00e5ff; color: #0a0a12; text-shadow: none; }
.controls-hint { font-size: 12px; color: #555; letter-spacing: 2px; margin-top: 16px; }
.controls-hint span { color: #00e5ff; }
#final-score { font-size: 28px; color: #ffcc00; letter-spacing: 4px; margin-bottom: 12px; text-shadow: 0 0 12px rgba(255,200,0,0.5); }
#high-score-display { font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 20px; }
#mobile-controls { position: absolute; bottom: 8px; left: 0; right: 0; display: none; justify-content: center; gap: 24px; pointer-events: all; padding: 0 16px; }
.mobile-btn { width: 56px; height: 56px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mobile-btn.shoot { width: 72px; height: 72px; border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.1); color: rgba(0,229,255,0.8); font-size: 28px; }
@media (max-width: 768px), (pointer: coarse) { #mobile-controls { display: flex; } #game-container { max-height: 100vh; } }
</style>
</head>
<body>
<div id="game-container">
<canvas id="game"></canvas>
<div id="ui-overlay">
<div><div class="ui-stat" id="score-ui">SCORE 0</div><div class="ui-stat combo" id="combo-ui" style="display:none"></div></div>
<div class="ui-stat lives" id="lives-ui">鈾?鈾?鈾?/div>
</div>
<div id="start-screen">
<div class="screen-title">鏄熼檯鎴樻満</div>
<div class="screen-subtitle">PIXEL SPACE SHOOTER</div>
<button class="screen-btn" id="start-btn" autofocus>寮€ 濮?/button>
<div class="controls-hint"><span>鏂瑰悜閿?/span> 绉诲姩 路 <span>绌烘牸</span> 灏勫嚮 路 <span>P</span> 鏆傚仠</div>
</div>
<div id="game-over-screen">
<div class="screen-title">鍧?姣?/div>
<div id="final-score">寰楀垎 0</div>
<div id="high-score-display">鏈€楂?0</div>
<button class="screen-btn" id="restart-btn">鍐?鏉?/button>
</div>
<div id="mobile-controls">
<button class="mobile-btn" id="btn-up">鈻?/button>
<button class="mobile-btn" id="btn-left">鈼€</button>
<button class="mobile-btn shoot" id="btn-shoot">鈼?/button>
<button class="mobile-btn" id="btn-right">鈻?/button>
<button class="mobile-btn" id="btn-down">鈻?/button>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
